name: SafeRx AI CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/saferx-backend
  DOCKER_TAG: ${{ github.sha }}

jobs:

  code-quality:
    name: Code Quality (Linting and Formatting)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Quality Tools
        run: pip install ruff black

      - name: Run Black (vérification du formatage)
        run: black --check backend/

      # - name: Run Ruff (linter)
      #   run: ruff check backend/

  unit-tests:
    name: Unit & Mock Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install Dependencies
        # On installe le MÊME requirements.txt qu'en local pour garantir
        # un environnement identique — plus de divergence CI vs local
        run: |
          uv pip install -r requirements-test.txt --system
          uv pip install pytest pytest-mock pytest-cov --system

      - name: Run Pytest
        run: python -m pytest backend/tests/ -v --tb=short --cov=backend --cov-report=term-missing
        env:
          PYTHONPATH: .
          DATABASE_URL: "sqlite:///:memory:"
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_ALGORITHM: "HS256"
          LLM_PROVIDER: "none"
          OLLAMA_BASE_URL: "http://localhost:11434"
          GEMINI_API_KEY: "dummy_key"
          LR_MODEL_PATH: "/tmp/lr_test.pkl"
          LR_MIN_SAMPLES: "20"

  deploy:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max