services:
  scraper:
    build:
      context: ./scraping
    container_name: saferxai_scraper
    profiles: [scraping]
    volumes:
      - ./data/raw:/app/data/raw
    command: python scraper_med_ma.py --output data/raw/all_drugs_med_ma.csv
    restart: "no"

  etl:
    build: { context: ./etl }
    profiles: [etl]
    command: ["python3", "transform_med_ma.py"]
    volumes:
      - ./data/raw:/app/data/raw
      - ./data/processed:/app/data/processed
    restart: "no"

  etl-load:
    build: { context: ./etl }
    profiles: [etl]
    command: ["python3", "load_med_ma.py"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/processed:/app/data/processed
    restart: "no"
  
  etl-parse-thesaurus:
    build: { context: ./etl }
    profiles: [tools]
    command: [
      "python3", "parse_thesaurus_ansm.py",
      "--pdf", "/data/raw/thesaurus_ansm_2023.pdf",
      "--out", "/data/processed/interactions_ansm.csv",
      "--stats"
    ]
    volumes:
      - ./data:/data
    restart: "no"
  
  etl-load-interactions:
    build: { context: ./etl }
    profiles: [etl]
    command: ["python3", "load_interactions.py"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/processed:/app/data/processed
    restart: "no"

  db:
    image: postgres:15
    container_name: saferxai_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    container_name: saferxai_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  ollama:
    image: ollama/ollama:latest
    container_name: saferxai_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pour utiliser le GPU (optionnel) :
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  api:
    build: .
    container_name: saferxai_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - GIT_PYTHON_REFRESH=quiet
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: saferxai_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    environment:
      - CHOKIDAR_USEPOLLING=true

  prometheus:
    image: prom/prometheus:latest
    container_name: saferxai_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - api
 
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: saferxai_cadvisor
    restart: always
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true
    depends_on:
      - api
 
  grafana:
    image: grafana/grafana:latest
    container_name: saferxai_grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=saferx2024
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  ollama_data:
  prometheus_data:
  grafana_data: