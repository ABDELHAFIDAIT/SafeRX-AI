services:
  scraper:
    build:
      context: ./scraping
    container_name: saferxai_scraper
    profiles: [scraping]
    volumes:
      - ./data/raw:/app/data/raw
    command: python scraper_med_ma.py --output data/raw/all_drugs_med_ma.csv
    restart: "no"

  etl:
    build: { context: ./etl }
    profiles: [etl]
    command: ["python3", "transform_med_ma.py"]
    volumes:
      - ./data/raw:/app/data/raw
      - ./data/processed:/app/data/processed
    restart: "no"

  etl-load:
    build: { context: ./etl }
    profiles: [etl]
    command: ["python3", "load_med_ma.py"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/processed:/app/data/processed
    restart: "no"
  
  etl-parse-thesaurus:
    build: { context: ./etl }
    profiles: [tools]
    command: [
      "python3", "parse_thesaurus_ansm.py",
      "--pdf", "/data/raw/thesaurus_ansm_2023.pdf",
      "--out", "/data/processed/interactions_ansm.csv",
      "--stats"
    ]
    volumes:
      - ./data:/data
    restart: "no"
  
  etl-load-interactions:
    build: { context: ./etl }
    profiles: [etl]
    command: ["python3", "load_interactions.py"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/processed:/app/data/processed
    restart: "no"

  db:
    image: postgres:15
    container_name: saferxai_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    container_name: saferxai_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  ollama:
    image: ollama/ollama:latest
    container_name: saferxai_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pour utiliser le GPU (optionnel) :
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  api:
    build: .
    container_name: saferxai_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - GIT_PYTHON_REFRESH=quiet
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: saferxai_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    environment:
      - CHOKIDAR_USEPOLLING=true

  prometheus:
    image: prom/prometheus:latest
    container_name: saferxai_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - api
 
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: saferxai_cadvisor
    restart: always
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true
    depends_on:
      - api
 
  grafana:
    image: grafana/grafana:latest
    container_name: saferxai_grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=saferx2024
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  airflow-db:
    image: postgres:15
    container_name: saferxai_airflow_db
    restart: always
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow_pass
      POSTGRES_DB:       airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
 
  airflow-init:
    build:
      context: ./airflow
    container_name: saferxai_airflow_init
    restart: "no"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_pass@airflow-db/airflow
      AIRFLOW__CORE__FERNET_KEY: "Hg-ThIUBNyfa8PnR9-DIt4jLoEIM_lIFx8lmf6HX-nQ="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "saferx-airflow-secret-key"
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password saferx2024
          --firstname Admin
          --lastname SafeRx
          --role Admin
          --email admin@saferx.ma || true
      "
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
    depends_on:
      airflow-db:
        condition: service_healthy
 
  airflow-webserver:
    build:
      context: ./airflow
    container_name: saferxai_airflow_webserver
    restart: always
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_pass@airflow-db/airflow
      AIRFLOW__CORE__FERNET_KEY: "Hg-ThIUBNyfa8PnR9-DIt4jLoEIM_lIFx8lmf6HX-nQ="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "saferx-airflow-secret-key"
      AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./scraping:/app/scraping:ro
      - ./etl:/app/etl:ro
      - ./data/raw:/app/data/raw
      - ./data/processed:/app/data/processed
      - airflow_logs:/opt/airflow/logs
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
 
  # Scheduler : exécute les DAGs selon leur planification
  airflow-scheduler:
    build:
      context: ./airflow
    container_name: saferxai_airflow_scheduler
    restart: always
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_pass@airflow-db/airflow
      AIRFLOW__CORE__FERNET_KEY: "Hg-ThIUBNyfa8PnR9-DIt4jLoEIM_lIFx8lmf6HX-nQ="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "saferx-airflow-secret-key"
      AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./scraping:/app/scraping:ro
      - ./etl:/app/etl:ro
      - ./data/raw:/app/data/raw
      - ./data/processed:/app/data/processed
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy

volumes:
  postgres_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  airflow_db_data:
  airflow_logs: