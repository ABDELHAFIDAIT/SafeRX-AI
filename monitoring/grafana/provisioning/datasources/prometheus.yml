# monitoring/grafana/provisioning/datasources/prometheus.yml
# GRAFANA 12 : NE PAS mettre uid ici — Grafana le gère automatiquement
# Mettre un uid fixe provoque "data source not found" si le volume existe déjà

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true